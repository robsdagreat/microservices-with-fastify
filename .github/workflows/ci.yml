name: CI/CD Pipeline

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build application
      run: npm run build

    - name: Start server and test endpoint
      run: |
        # Start the server in the background
        node dist/index.js &
        SERVER_PID=$!
        
        # Wait for server to start
        echo "Waiting for server to start..."
        sleep 10
        
        # Test the GET /posts endpoint
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/posts)
        
        # Kill the server
        kill $SERVER_PID
        
        # Check if the response was successful
        if [ "$RESPONSE" -eq 200 ]; then
          echo "Endpoint test successful!"
          exit 0
        else
          echo "Endpoint test failed with status code: $RESPONSE"
          exit 1
        fi